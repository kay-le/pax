# @package _global_

# Welfare Shaper vs Tabular (IPD) — RL-based training
# Maximises joint welfare with IR constraints via Lagrangian dual ascent.
# Agent1 is trained with PPO (not ES).

# Agents
agent1: 'WelfareShaper'
agent2: 'Tabular'

# Environment
env_id: iterated_matrix_game
env_type: meta
env_discount: 0.96
payoff: [[-1, -1], [-3, 0], [0, -3], [-2, -2]]

# Runner
runner: welfare_rl

# Training
num_envs: 4
num_opps: 1
num_outer_steps: 100
num_inner_steps: 100
num_iters: 1000
num_devices: 1
att_type: 'nothing'

# Welfare / Lagrangian config
welfare:
  mu1: 0.0
  mu2: 0.0
  dual_lr: 0.01
  calibration: True
  calibration_episodes: 10

# PPO agent parameters (for WelfareShaper = agent1)
ppo1:
  num_minibatches: 4
  num_epochs: 4
  gamma: 0.96
  gae_lambda: 0.95
  ppo_clipping_epsilon: 0.2
  value_coeff: 0.5
  clip_value: True
  max_gradient_norm: 0.5
  anneal_entropy: False
  entropy_coeff_start: 0.02
  entropy_coeff_horizon: 2000000
  entropy_coeff_end: 0.001
  lr_scheduling: False
  learning_rate: 0.005
  adam_epsilon: 1e-5
  with_memory: False
  with_cnn: False
  hidden_size: 16

# PPO agent parameters (for Tabular = agent2)
ppo2:
  num_minibatches: 4
  num_epochs: 2
  gamma: 0.96
  gae_lambda: 0.95
  ppo_clipping_epsilon: 0.2
  value_coeff: 0.5
  clip_value: True
  max_gradient_norm: 0.5
  anneal_entropy: False
  entropy_coeff_start: 0.02
  entropy_coeff_horizon: 2000000
  entropy_coeff_end: 0.001
  lr_scheduling: False
  learning_rate: 1
  adam_epsilon: 1e-5
  with_memory: False
  with_cnn: False
  hidden_size: 16

# Logging setup
wandb:
  entity: "lichenqi-university-of-regina"
  project: ipd
  group: '${agent1}-vs-${agent2}'
  name: run-seed-${seed}
  log: True
  mode: offline
