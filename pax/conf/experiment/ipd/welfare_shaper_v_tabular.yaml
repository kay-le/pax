# @package _global_

# Welfare Shaper vs Tabular (IPD) — ES-based training
# Maximises joint welfare with IR constraints via Lagrangian dual ascent.

# Agents
agent1: 'WelfareShaperAtt' #shaper  architecture
agent2: 'Tabular'

# Environment
env_id: iterated_matrix_game
env_type: meta
env_discount: 0.96
#payoff: [[-1, -1], [-3, 0], [0, -3], [-2, -2]]
payoff: [[3, 3], [1, 4], [4, 1], [2, 2]]


# Runner
runner: welfare_evo


# Save
save: True
save_interval: 100

# Training
top_k: 5
popsize: 1000
num_envs: 2
num_opps: 10
num_outer_steps: 100
num_inner_steps: 100
num_iters: 1000
att_type: 'nothing'
num_devices: 1

# Welfare / Lagrangian config
welfare:
  mu1: 0.0
  mu2: 0.0
  dual_lr: 0.01
  calibration: False
  v_ref_shaper: 2.0
  v_ref_opponent: 2.0
  resume_dir: ""

# PPO agent parameters (for WelfareShaper = agent1)
ppo1:
  num_minibatches: 4
  num_epochs: 2
  gamma: 0.96
  gae_lambda: 0.95
  ppo_clipping_epsilon: 0.2
  value_coeff: 0.5
  clip_value: True
  max_gradient_norm: 0.5
  anneal_entropy: False
  entropy_coeff_start: 0.02
  entropy_coeff_horizon: 2000000
  entropy_coeff_end: 0.001
  lr_scheduling: False
  learning_rate: 1
  adam_epsilon: 1e-5
  with_memory: False
  with_cnn: False
  hidden_size: 16

# PPO agent parameters (for Tabular = agent2)
ppo2:
  num_minibatches: 4
  num_epochs: 2
  gamma: 0.96
  gae_lambda: 0.95
  ppo_clipping_epsilon: 0.2
  value_coeff: 0.5
  clip_value: True
  max_gradient_norm: 0.5
  anneal_entropy: False
  entropy_coeff_start: 0.02
  entropy_coeff_horizon: 2000000
  entropy_coeff_end: 0.001
  lr_scheduling: False
  learning_rate: 1
  adam_epsilon: 1e-5
  with_memory: False
  with_cnn: False
  hidden_size: 16

# ES parameters
es:
  algo: OpenES
  sigma_init: 0.04
  sigma_decay: 0.999
  sigma_limit: 0.01
  init_min: 0.0
  init_max: 0.0
  clip_min: -1e10
  clip_max: 1e10
  lrate_init: 0.01
  lrate_decay: 0.9999
  lrate_limit: 0.001
  beta_1: 0.99
  beta_2: 0.999
  eps: 1e-8
  centered_rank: False
  w_decay: 0
  maximise: True
  z_score: True
  mean_reduce: True

# Logging setup
wandb:
  entity: "lichenqi-university-of-regina"
  project: ipd
  group: '${agent1}-vs-${agent2}'
  name: run-seed-${seed}-pop-size-${popsize}
  log: True
  mode: offline
