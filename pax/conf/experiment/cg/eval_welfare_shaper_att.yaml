# @package _global_

# Evaluate a pretrained Welfare Shaper (Attention) vs fresh PPO_memory (Coin Game)
# Freezes the shaper and lets the opponent learn over many episodes.

# Agents
agent1: 'WelfareShaperAtt'
agent2: 'PPO_memory'

# Environment
env_id: coin_game
env_type: meta
egocentric: True
env_discount: 0.96
payoff: [[1, 1, -2], [1, 1, -2]]

# Runner
runner: welfare_eval

# Training / Evaluation
num_envs: 100
num_opps: 1
num_outer_steps: 600
num_inner_steps: 16
num_iters: 1000
num_devices: 1
att_type: 'att'
agent2_reset_interval: 1

# Evaluation — pretrained model
run_path: ucl-dark/cg/REPLACE_WITH_RUN_ID
model_path: REPLACE_WITH_MODEL_PATH

# Welfare / IR reference values (from calibration during training)
welfare:
  v_ref_shaper: 0.0
  v_ref_opponent: 0.0

# PPO agent parameters (for WelfareShaperAtt = agent1)
ppo1:
  num_minibatches: 8
  num_epochs: 2
  gamma: 0.96
  gae_lambda: 0.95
  ppo_clipping_epsilon: 0.2
  value_coeff: 0.5
  clip_value: True
  max_gradient_norm: 0.5
  anneal_entropy: False
  entropy_coeff_start: 0.1
  entropy_coeff_horizon: 0.6e8
  entropy_coeff_end: 0.005
  lr_scheduling: False
  learning_rate: 0.005
  adam_epsilon: 1e-5
  with_memory: True
  with_cnn: False
  output_channels: 16
  kernel_shape: [3, 3]
  separate: True
  hidden_size: 16

# PPO agent parameters (for PPO_memory = agent2)
ppo2:
  num_minibatches: 8
  num_epochs: 2
  gamma: 0.96
  gae_lambda: 0.95
  ppo_clipping_epsilon: 0.2
  value_coeff: 0.5
  clip_value: True
  max_gradient_norm: 0.5
  anneal_entropy: False
  entropy_coeff_start: 0.1
  entropy_coeff_horizon: 0.6e8
  entropy_coeff_end: 0.005
  lr_scheduling: False
  learning_rate: 0.005
  adam_epsilon: 1e-5
  with_memory: True
  with_cnn: False
  output_channels: 16
  kernel_shape: [3, 3]
  separate: True
  hidden_size: 16

# Logging setup
wandb:
  entity: "lichenqi-university-of-regina"
  project: cg
  group: 'eval-welfare-${agent1}-vs-${agent2}'
  name: eval-seed-${seed}
  log: True
  mode: offline
