# @package _global_

# Welfare Shaper (Attention-based) vs PPO_memory (InTheMatrix / STORM)
# Uses shaper_att architecture — works well in STORM unlike MFOS.
# Maximises joint welfare with IR constraints via Lagrangian dual ascent.

# Agents
agent1: 'WelfareShaperAtt'
agent2: 'PPO_memory'

# Environment
env_id: InTheMatrix
env_type: meta
env_discount: 0.96
freeze: 5
payoff: [[[3, 0], [5, 1]], [[3, 5], [0, 1]]]
fixed_coins: True

# Save
save: True
save_interval: 100

# Runner
runner: welfare_evo

# Training
top_k: 8
popsize: 128
num_envs: 50
num_opps: 1
num_devices: 4
num_outer_steps: 500
num_inner_steps: 152
num_iters: 5000
att_type: avg

# Welfare / Lagrangian config
welfare:
  rho: 1.0              # NEW: quadratic penalty coefficient
  rho_schedule: 1.5     # NEW: multiply rho by this if constraint violated for N consecutive gens
  rho_patience: 30
  rho_max : 50
  mu1: 0.0
  mu2: 0.0
  dual_lr: 0.01
  calibration: False
  v_ref_shaper: 5.56
  v_ref_opponent: 5.56
  resume_dir: ""           # persistent dir to scan for resume (empty = fresh start)

# PPO agent parameters (for WelfareShaperAtt = agent1)
ppo1:
  num_minibatches: 8
  num_epochs: 2
  gamma: 0.96
  gae_lambda: 0.95
  ppo_clipping_epsilon: 0.2
  value_coeff: 0.5
  clip_value: True
  max_gradient_norm: 0.5
  anneal_entropy: False
  entropy_coeff_start: 0.1
  entropy_coeff_horizon: 0.6e8
  entropy_coeff_end: 0.005
  lr_scheduling: False
  learning_rate: 0.005
  adam_epsilon: 1e-5
  with_memory: True
  with_cnn: True
  output_channels: 16
  kernel_shape: [3, 3]
  separate: False
  hidden_size: 32

# PPO agent parameters (for PPO_memory = agent2)
ppo2:
  num_minibatches: 8
  num_epochs: 2
  gamma: 0.96
  gae_lambda: 0.95
  ppo_clipping_epsilon: 0.2
  value_coeff: 0.5
  clip_value: True
  max_gradient_norm: 0.5
  anneal_entropy: False
  entropy_coeff_start: 0.1
  entropy_coeff_horizon: 0.6e8
  entropy_coeff_end: 0.005
  lr_scheduling: False
  learning_rate: 0.005
  adam_epsilon: 1e-5
  with_memory: True
  with_cnn: True
  output_channels: 16
  kernel_shape: [3, 3]
  separate: True
  hidden_size: 8

# ES parameters
es:
  algo: OpenES
  sigma_init: 0.075
  sigma_decay: 0.999
  sigma_limit: 0.01
  init_min: 0.0
  init_max: 0.0
  clip_min: -1e10
  clip_max: 1e10
  lrate_init: 0.05
  lrate_decay: 0.999
  lrate_limit: 0.001
  beta_1: 0.99
  beta_2: 0.999
  eps: 1e-8
  elite_ratio: 0.1
  centered_rank: True
  w_decay: 0.1
  maximise: True
  z_score: False
  mean_reduce: False

# Logging setup
wandb:
  entity: "lichenqi-university-of-regina"
  project: ipditm
  group: 'welfare-${agent1}-vs-${agent2}-mean_ref'
  name: run-seed-${seed}
  log: True
  mode: offline
