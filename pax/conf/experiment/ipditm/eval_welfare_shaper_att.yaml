# @package _global_

# Evaluate a pretrained Welfare Shaper (Attention) vs fresh PPO_memory (InTheMatrix/STORM)
# Freezes the shaper and lets the opponent learn over many episodes.

# Agents
agent1: 'WelfareShaperAtt'
agent2: 'PPO_memory'

# Environment
env_id: InTheMatrix
env_type: meta
env_discount: 0.96
freeze: 5
payoff: [[[3, 0], [5, 1]], [[3, 5], [0, 1]]]
fixed_coins: True

# Runner
runner: welfare_eval

# Training / Evaluation
num_envs: 50
num_opps: 1
num_outer_steps: 500
num_inner_steps: 152
num_iters: 100
num_devices: 1
att_type: avg
agent2_reset_interval: 1

# Evaluation — pretrained model
run_path: ucl-dark/ipditm/REPLACE_WITH_RUN_ID
model_path: REPLACE_WITH_MODEL_PATH

# Welfare / IR reference values (from calibration during training)
welfare:
  v_ref_shaper: 0.0
  v_ref_opponent: 0.0

# PPO agent parameters (for WelfareShaperAtt = agent1)
ppo1:
  num_minibatches: 8
  num_epochs: 2
  gamma: 0.96
  gae_lambda: 0.95
  ppo_clipping_epsilon: 0.2
  value_coeff: 0.5
  clip_value: True
  max_gradient_norm: 0.5
  anneal_entropy: False
  entropy_coeff_start: 0.1
  entropy_coeff_horizon: 0.6e8
  entropy_coeff_end: 0.005
  lr_scheduling: False
  learning_rate: 0.005
  adam_epsilon: 1e-5
  with_memory: True
  with_cnn: True
  output_channels: 16
  kernel_shape: [3, 3]
  separate: False
  hidden_size: 32

# PPO agent parameters (for PPO_memory = agent2)
ppo2:
  num_minibatches: 8
  num_epochs: 2
  gamma: 0.96
  gae_lambda: 0.95
  ppo_clipping_epsilon: 0.2
  value_coeff: 0.5
  clip_value: True
  max_gradient_norm: 0.5
  anneal_entropy: False
  entropy_coeff_start: 0.1
  entropy_coeff_horizon: 0.6e8
  entropy_coeff_end: 0.005
  lr_scheduling: False
  learning_rate: 0.005
  adam_epsilon: 1e-5
  with_memory: True
  with_cnn: True
  output_channels: 16
  kernel_shape: [3, 3]
  separate: True
  hidden_size: 8

# Logging setup
wandb:
  entity: "ucl-dark"
  project: ipditm
  group: 'eval-welfare-${agent1}-vs-${agent2}'
  name: eval-seed-${seed}
  log: False
